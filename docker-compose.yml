version: "3.8"

services:
  web:
    build: .
    container_name: ingenieriacantabria
    restart: unless-stopped
    ports:
      - "3010:3000"
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    env_file:
      - .env.local
